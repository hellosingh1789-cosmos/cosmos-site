<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solar System — COSMOS</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <style>
    /* ─── Reset & Base ─────────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --void:   #02030a;
      --deep:   #070b18;
      --gold:   #f0c040;
      --plasma: #4fc3f7;
      --white:  #e8eaf5;
      --dim:    rgba(232,234,245,0.45);
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--void);
      color: var(--white);
      font-family: 'Space Mono', monospace;
      cursor: crosshair;
    }

    /* ─── Starfield Canvas ──────────────────────────────────── */
    #starfield {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ─── Header ────────────────────────────────────────────── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.2rem 2.5rem;
      background: linear-gradient(to bottom, rgba(2,3,10,0.95), transparent);
      pointer-events: none;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      letter-spacing: 0.3em;
      color: var(--gold);
      text-decoration: none;
      pointer-events: all;
    }

    .header-hint {
      font-size: 0.55rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(232,234,245,0.3);
    }

    /* ─── Solar System Canvas ───────────────────────────────── */
    #solar-canvas {
      position: fixed;
      inset: 0;
      z-index: 1;
      cursor: crosshair;
    }

    /* ─── Planet Tooltip Label ──────────────────────────────── */
    #planet-label {
      position: fixed;
      z-index: 50;
      pointer-events: none;
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      background: rgba(2,3,10,0.85);
      border: 1px solid rgba(240,192,64,0.25);
      padding: 0.3rem 0.7rem;
      opacity: 0;
      transition: opacity 0.2s;
      white-space: nowrap;
    }
    #planet-label.visible { opacity: 1; }

    /* ─── Info Panel ────────────────────────────────────────── */
    #info-panel {
      position: fixed;
      right: 2rem;
      top: 50%;
      transform: translateY(-50%) translateX(120%);
      z-index: 200;
      width: 300px;
      background: rgba(7,11,24,0.97);
      border: 1px solid rgba(79,195,247,0.18);
      backdrop-filter: blur(16px);
      transition: transform 0.45s cubic-bezier(0.16,1,0.3,1), opacity 0.4s;
      opacity: 0;
    }
    #info-panel.open {
      transform: translateY(-50%) translateX(0);
      opacity: 1;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 1.5rem 0.8rem;
      border-bottom: 1px solid rgba(232,234,245,0.06);
    }

    .panel-tag {
      font-size: 0.5rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--plasma);
    }

    .panel-close {
      background: none;
      border: none;
      color: rgba(232,234,245,0.35);
      font-size: 1rem;
      cursor: pointer;
      transition: color 0.2s;
      line-height: 1;
      padding: 0;
    }
    .panel-close:hover { color: var(--white); }

    .panel-body { padding: 1.5rem; }

    .panel-planet-vis {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 90px;
      margin-bottom: 1.2rem;
    }

    .panel-planet-sphere {
      border-radius: 50%;
      box-shadow: 0 0 40px 8px currentColor;
    }

    .panel-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 0.08em;
      line-height: 1;
      margin-bottom: 0.5rem;
    }

    .panel-type {
      font-size: 0.55rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--plasma);
      margin-bottom: 1rem;
    }

    .panel-desc {
      font-family: 'Crimson Pro', serif;
      font-size: 0.95rem;
      color: var(--dim);
      line-height: 1.75;
      margin-bottom: 1.5rem;
    }

    .panel-body { padding: 1.5rem; overflow-y: auto; max-height: 70vh; }
    .panel-bullets { list-style: none; padding: 0; margin: 0 0 1.2rem; display: flex; flex-direction: column; gap: 0.5rem; }
    .panel-bullets li { font-family: 'Crimson Pro', serif; font-size: 0.95rem; color: rgba(232,234,245,0.72); line-height: 1.7; padding-left: 1.2rem; position: relative; }
    .panel-bullets li::before { content: '\2014'; position: absolute; left: 0; color: #f0c040; font-size: 0.9rem; }
    .panel-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: rgba(255,255,255,0.04);
    }

    .stat-item {
      background: var(--deep);
      padding: 0.7rem 0.9rem;
    }

    .stat-val {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 0.15rem;
    }

    .stat-label {
      display: block;
      font-size: 0.5rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(232,234,245,0.3);
    }

    /* ─── Speed Control ─────────────────────────────────────── */
    #speed-control {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 1rem;
      background: rgba(7,11,24,0.9);
      border: 1px solid rgba(232,234,245,0.07);
      padding: 0.7rem 1.5rem;
      backdrop-filter: blur(8px);
    }

    .speed-label {
      font-size: 0.5rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(232,234,245,0.35);
      white-space: nowrap;
    }

    #speed-slider {
      -webkit-appearance: none;
      width: 120px;
      height: 2px;
      background: rgba(232,234,245,0.1);
      outline: none;
      cursor: pointer;
    }
    #speed-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--gold);
      cursor: pointer;
    }
    #speed-slider::-moz-range-thumb {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--gold);
      border: none;
      cursor: pointer;
    }

    .speed-val {
      font-size: 0.55rem;
      color: var(--gold);
      min-width: 28px;
    }

    .pause-btn {
      background: none;
      border: 1px solid rgba(232,234,245,0.12);
      color: rgba(232,234,245,0.5);
      font-family: 'Space Mono', monospace;
      font-size: 0.5rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 0.4rem 0.8rem;
      cursor: pointer;
      transition: border-color 0.3s, color 0.3s;
    }
    .pause-btn:hover { border-color: var(--plasma); color: var(--plasma); }
    .back-btn:hover { color: var(--plasma) !important; border-color: rgba(79,195,247,0.4) !important; }

    /* ─── Mobile ────────────────────────────────────────────── */
    @media (max-width: 600px) {
      header { padding: 1rem 1.2rem; }
      .logo { font-size: 1.3rem; }
      #info-panel {
        right: 0; left: 0;
        top: auto; bottom: 0;
        width: 100%;
        transform: translateY(110%);
        border-bottom: none;
      }
      #info-panel.open { transform: translateY(0); }
      #speed-control { bottom: 1rem; padding: 0.6rem 1rem; gap: 0.6rem; }
      #speed-slider { width: 80px; }
    }
  </style>
</head>
<body>

  <!-- Background starfield -->
  <canvas id="starfield"></canvas>

  <!-- Header -->
  <header>
    <a href="index.html" class="logo">COSMOS</a>
    <div style="display:flex;align-items:center;gap:1.5rem;">
      <span class="header-hint">Click any planet to explore</span>
      <a href="index.html" class="back-btn" style="font-size:0.55rem;letter-spacing:0.2em;text-transform:uppercase;color:rgba(232,234,245,0.45);text-decoration:none;border:1px solid rgba(232,234,245,0.12);padding:0.45rem 1rem;transition:color 0.3s,border-color 0.3s;pointer-events:all;white-space:nowrap;">&#8592; Back to COSMOS</a>
    </div>
  </header>

  <!-- Solar system canvas -->
  <canvas id="solar-canvas"></canvas>

  <!-- Hover label -->
  <div id="planet-label"></div>

  <!-- Info Panel -->
  <aside id="info-panel" role="complementary" aria-label="Planet information">
    <div class="panel-header">
      <span class="panel-tag" id="panel-tag">Solar System</span>
      <button class="panel-close" id="panel-close" aria-label="Close panel">&#x2715;</button>
    </div>
    <div class="panel-body">
      <div class="panel-planet-vis">
        <div class="panel-planet-sphere" id="panel-sphere"></div>
      </div>
      <div class="panel-name"  id="panel-name"></div>
      <div class="panel-type"  id="panel-type"></div>
      <ul  class="panel-bullets" id="panel-bullets"></ul>
      <div class="panel-desc"  id="panel-desc"></div>
      <div class="panel-stats" id="panel-stats"></div>
    </div>
  </aside>

  <!-- Speed Control -->
  <div id="speed-control">
    <span class="speed-label">Orbit Speed</span>
    <input type="range" id="speed-slider" min="0.1" max="5" step="0.1" value="1">
    <span class="speed-val" id="speed-val">1.0x</span>
    <button class="pause-btn" id="pause-btn">PAUSE</button>
  </div>

  <script>
    /* ═══════════════════════════════════════════════════════════
       COSMOS — Solar System  |  script
       ═══════════════════════════════════════════════════════════ */

    // ─── Planet Data ─────────────────────────────────────────────
    const PLANETS = [
      {
        name: "Mercury", type: "Terrestrial Planet",
        color: "#b5b5b0", glowColor: "#b5b5b0",
        radius: 5, orbitRadius: 90, speed: 0.048,
        desc: "<p>The swiftest world — scorched by day, frozen by night. Its 88-day year is the shortest in the solar system.</p>",
        stats: [{ val:"88 days",label:"Orbit Period"},{val:"4,879 km",label:"Diameter"},{val:"0",label:"Moons"},{val:"430°C",label:"Max Temp"}],
      },
      {
        name: "Venus", type: "Terrestrial Planet",
        color: "#e8cda0", glowColor: "#e8cda0",
        radius: 8, orbitRadius: 140, speed: 0.035,
        desc: "<p>A hellish world shrouded in thick sulfuric acid clouds. The hottest planet despite not being closest to the Sun.</p>",
        stats: [{ val:"225 days",label:"Orbit Period"},{val:"12,104 km",label:"Diameter"},{val:"0",label:"Moons"},{val:"465°C",label:"Avg Temp"}],
      },
      {
        name: "Earth", type: "Terrestrial Planet",
        color: "#4f9be8", glowColor: "#4f9be8",
        radius: 8.5, orbitRadius: 200, speed: 0.029,
        desc: "<p>Our pale blue dot — the only known world harboring life. A thin atmospheric shell stands between us and the void.</p>",
        stats: [{ val:"365 days",label:"Orbit Period"},{val:"12,742 km",label:"Diameter"},{val:"1",label:"Moons"},{val:"15°C",label:"Avg Temp"}],
      },
      {
        name: "Mars", type: "Terrestrial Planet",
        color: "#c1440e", glowColor: "#c1440e",
        radius: 6, orbitRadius: 265, speed: 0.024,
        desc: "<p>The Red Planet — a cold desert world with the solar system's tallest volcano and a canyon that dwarfs the Grand Canyon.</p>",
        stats: [{ val:"687 days",label:"Orbit Period"},{val:"6,779 km",label:"Diameter"},{val:"2",label:"Moons"},{val:"-60°C",label:"Avg Temp"}],
      },
      {
        name: "Jupiter", type: "Gas Giant",
        color: "#c88b3a", glowColor: "#c88b3a",
        radius: 26, orbitRadius: 360, speed: 0.013,
        desc: "<p>King of the planets. Its Great Red Spot — a storm larger than Earth — has raged for over 350 years.</p>",
        stats: [{ val:"11.9 yrs",label:"Orbit Period"},{val:"139,820 km",label:"Diameter"},{val:"95",label:"Moons"},{val:"-110°C",label:"Cloud Temp"}],
      },
      {
        name: "Saturn", type: "Gas Giant",
        color: "#e4d191", glowColor: "#e4d191",
        radius: 22, orbitRadius: 460, speed: 0.0096, hasRings: true,
        desc: "<p>The jewel of the solar system. Saturn's iconic rings are made of ice and rock, stretching 282,000 km but only metres thick.</p>",
        stats: [{ val:"29.5 yrs",label:"Orbit Period"},{val:"116,460 km",label:"Diameter"},{val:"146",label:"Moons"},{val:"-140°C",label:"Cloud Temp"}],
      },
      {
        name: "Uranus", type: "Ice Giant",
        color: "#7de8e8", glowColor: "#7de8e8",
        radius: 14, orbitRadius: 555, speed: 0.0068,
        desc: "<p>The tilted giant — Uranus rotates on its side at 98°, essentially rolling around the Sun like a bowling ball.</p>",
        stats: [{ val:"84 yrs",label:"Orbit Period"},{val:"50,724 km",label:"Diameter"},{val:"27",label:"Moons"},{val:"-195°C",label:"Avg Temp"}],
      },
      {
        name: "Neptune", type: "Ice Giant",
        color: "#3f54ba", glowColor: "#4f64ca",
        radius: 13, orbitRadius: 640, speed: 0.0054,
        desc: "<p>The windiest world — Neptune's storms reach 2,100 km/h. Its moon Triton orbits backwards and is slowly spiraling inward.</p>",
        stats: [{ val:"165 yrs",label:"Orbit Period"},{val:"49,244 km",label:"Diameter"},{val:"16",label:"Moons"},{val:"-200°C",label:"Avg Temp"}],
      },
    ];

    // ─── State ────────────────────────────────────────────────────
    let angles = PLANETS.map((_, i) => (i / PLANETS.length) * Math.PI * 2);
    let paused = false, speedMult = 1;
    let selectedPlanet = null, hoveredPlanet = null;
    let cx = 0, cy = 0;

    // ─── Canvas Setup ─────────────────────────────────────────────
    const canvas = document.getElementById('solar-canvas');
    const ctx    = canvas.getContext('2d');

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
      cx = canvas.width  / 2;
      cy = canvas.height / 2;
    }
    window.addEventListener('resize', resize);
    resize();

    // ─── Starfield ────────────────────────────────────────────────
    const sfCanvas = document.getElementById('starfield');
    const sfCtx    = sfCanvas.getContext('2d');
    let stars = [];

    function initStars() {
      sfCanvas.width  = window.innerWidth;
      sfCanvas.height = window.innerHeight;
      stars = [];
      for (let i = 0; i < 320; i++) {
        stars.push({
          x: Math.random() * sfCanvas.width,
          y: Math.random() * sfCanvas.height,
          r: Math.random() * 1.3 + 0.2,
          speed: Math.random() * 0.004 + 0.001,
          phase: Math.random() * Math.PI * 2,
        });
      }
    }

    function drawStars(t) {
      sfCtx.clearRect(0, 0, sfCanvas.width, sfCanvas.height);
      stars.forEach(s => {
        const a = 0.25 + 0.7 * (0.5 + 0.5 * Math.sin(t * s.speed + s.phase));
        sfCtx.beginPath();
        sfCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        sfCtx.fillStyle = `rgba(232,234,245,${a})`;
        sfCtx.fill();
      });
    }

    window.addEventListener('resize', initStars);
    initStars();

    // ─── Colour Utilities ─────────────────────────────────────────
    function hexToRgb(hex) {
      return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
    }
    function lighten(hex, amt) {
      const [r,g,b] = hexToRgb(hex);
      return `rgb(${Math.min(r+amt,255)},${Math.min(g+amt,255)},${Math.min(b+amt,255)})`;
    }
    function darken(hex, amt) {
      const [r,g,b] = hexToRgb(hex);
      return `rgb(${Math.max(r-amt,0)},${Math.max(g-amt,0)},${Math.max(b-amt,0)})`;
    }

    function orbitScale() {
      const maxOrbit  = PLANETS[PLANETS.length - 1].orbitRadius;
      const available = Math.min(window.innerWidth, window.innerHeight) / 2 * 0.88;
      return Math.min(1, available / maxOrbit);
    }

    // ─── Drawing ──────────────────────────────────────────────────
    function drawSun() {
      const g1 = ctx.createRadialGradient(cx,cy,0,cx,cy,80);
      g1.addColorStop(0,  'rgba(255,220,80,0.22)');
      g1.addColorStop(0.5,'rgba(255,160,20,0.08)');
      g1.addColorStop(1,  'rgba(255,100,0,0)');
      ctx.beginPath(); ctx.arc(cx,cy,80,0,Math.PI*2);
      ctx.fillStyle = g1; ctx.fill();

      const g2 = ctx.createRadialGradient(cx,cy,0,cx,cy,30);
      g2.addColorStop(0,   '#fff8d0');
      g2.addColorStop(0.4, '#f0c040');
      g2.addColorStop(0.75,'#e06000');
      g2.addColorStop(1,   'rgba(200,60,0,0)');
      ctx.beginPath(); ctx.arc(cx,cy,30,0,Math.PI*2);
      ctx.fillStyle = g2; ctx.fill();
    }

    function drawOrbit(planet) {
      const scale = orbitScale();
      ctx.beginPath();
      ctx.arc(cx, cy, planet.orbitRadius * scale, 0, Math.PI * 2);
      ctx.strokeStyle = hoveredPlanet === planet ? 'rgba(79,195,247,0.22)' : 'rgba(232,234,245,0.12)';
      ctx.lineWidth   = hoveredPlanet === planet ? 1.5 : 0.8;
      ctx.setLineDash([3, 7]);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    function drawPlanet(planet, angle) {
      const scale = orbitScale();
      const x = cx + Math.cos(angle) * planet.orbitRadius * scale;
      const y = cy + Math.sin(angle) * planet.orbitRadius * scale;
      const r = planet.radius * Math.min(scale + 0.3, 1.2);
      const isSelected = selectedPlanet === planet;
      const isHovered  = hoveredPlanet  === planet;

      if (planet.hasRings) {
        ctx.save();
        ctx.translate(x, y);
        ctx.scale(1, 0.35);
        const rg = ctx.createRadialGradient(0,0,r*1.4,0,0,r*2.3);
        rg.addColorStop(0,  'rgba(228,209,145,0.5)');
        rg.addColorStop(0.5,'rgba(228,209,145,0.25)');
        rg.addColorStop(1,  'rgba(228,209,145,0)');
        ctx.beginPath(); ctx.arc(0,0,r*2.3,0,Math.PI*2);
        ctx.fillStyle = rg; ctx.fill();
        ctx.restore();
      }

      if (isSelected || isHovered) {
        const glowR = r * (isSelected ? 3.5 : 2.5);
        const g = ctx.createRadialGradient(x,y,r*0.5,x,y,glowR);
        g.addColorStop(0, planet.glowColor + 'aa');
        g.addColorStop(1, planet.glowColor + '00');
        ctx.beginPath(); ctx.arc(x,y,glowR,0,Math.PI*2);
        ctx.fillStyle = g; ctx.fill();
      }

      const pg = ctx.createRadialGradient(x-r*0.3,y-r*0.3,r*0.1,x,y,r);
      pg.addColorStop(0,   lighten(planet.color, 40));
      pg.addColorStop(0.6, planet.color);
      pg.addColorStop(1,   darken(planet.color, 40));
      ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
      ctx.fillStyle = pg; ctx.fill();

      if (isSelected) {
        ctx.beginPath(); ctx.arc(x,y,r+4,0,Math.PI*2);
        ctx.strokeStyle = planet.color + 'cc';
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }
    }

    // ─── Main Loop ────────────────────────────────────────────────
    let lastTime = 0;
    function loop(ts) {
      const dt = Math.min(ts - lastTime, 50);
      lastTime = ts;

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawStars(ts * 0.001);

      if (!paused) {
        PLANETS.forEach((p, i) => { angles[i] += p.speed * speedMult * (dt / 16.67); });
      }

      PLANETS.forEach(p  => drawOrbit(p));
      drawSun();
      PLANETS.forEach((p, i) => drawPlanet(p, angles[i]));

      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);

    // ─── Interaction ──────────────────────────────────────────────
    const label      = document.getElementById('planet-label');
    const panel      = document.getElementById('info-panel');
    const panelTag   = document.getElementById('panel-tag');
    const panelName  = document.getElementById('panel-name');
    const panelType  = document.getElementById('panel-type');
    const panelDesc  = document.getElementById('panel-desc');
    const panelStats   = document.getElementById('panel-stats');
    const panelSphere  = document.getElementById('panel-sphere');
    const panelBullets = document.getElementById('panel-bullets');

    const SUN = {
      name: "The Sun",
      type: "G-Type Main-Sequence Star",
      color: "#f0c040",
      glowColor: "#f0c040",
      bullets: [
        "Contains 99.86% of all the mass in the solar system — over 1.3 million Earths could fit inside it.",
        "Surface temperature of ~5,500°C, but the corona (outer atmosphere) mysteriously reaches over 1,000,000°C.",
        "Every second, the Sun converts 600 million tonnes of hydrogen into helium through nuclear fusion."
      ],
      desc: "<p>The Sun is the beating heart of our solar system — a colossal sphere of superheated plasma held together by its own immense gravity. At its core, temperatures exceed 15 million °C, where nuclear fusion fuses hydrogen nuclei into helium, releasing the energy that has lit our sky for 4.6 billion years. That energy takes around 100,000 years to travel from the core to the surface, then just 8 minutes to reach Earth.</p><p style='margin-top:1rem;'>The Sun is currently halfway through its life. In roughly 5 billion years it will expand into a red giant, engulfing the inner planets, before shedding its outer layers as a planetary nebula and leaving behind a cooling white dwarf. For now, its solar wind — a constant stream of charged particles — fills the entire solar system, shaping planetary magnetospheres and painting auroras on worlds billions of kilometres away.</p>",
      stats: [
        { val: "4.6 Gyr",     label: "Age" },
        { val: "1,392,700 km",label: "Diameter" },
        { val: "15,000,000°C",label: "Core Temp" },
        { val: "~5 Gyr",      label: "Life Remaining" },
      ]
    };

    function getPlanetPos(i) {
      const scale = orbitScale(), p = PLANETS[i];
      return {
        x: cx + Math.cos(angles[i]) * p.orbitRadius * scale,
        y: cy + Math.sin(angles[i]) * p.orbitRadius * scale,
        r: p.radius * Math.min(scale + 0.3, 1.2),
      };
    }

    function hitTest(mx, my) {
      for (let i = PLANETS.length - 1; i >= 0; i--) {
        const { x, y, r } = getPlanetPos(i);
        if (Math.hypot(mx - x, my - y) <= r + 6) return i;
      }
      // Check sun (radius ~30px)
      if (Math.hypot(mx - cx, my - cy) <= 34) return 'sun';
      return -1;
    }

    function openPanel(planet) {
      selectedPlanet = planet;
      panelTag.textContent  = 'Solar System — ' + planet.type;
      panelName.textContent = planet.name;
      panelType.textContent = planet.type;
      // Bullets
      if (planet.bullets && planet.bullets.length) {
        panelBullets.innerHTML = planet.bullets.map(b => `<li>${b}</li>`).join('');
        panelBullets.style.display = 'flex';
      } else {
        panelBullets.innerHTML = '';
        panelBullets.style.display = 'none';
      }
      // Desc — support plain text or HTML
      panelDesc.innerHTML = planet.desc || '';
      const sz = 56;
      panelSphere.style.cssText = `width:${sz}px;height:${sz}px;border-radius:50%;box-shadow:0 0 40px 8px ${planet.glowColor};background:radial-gradient(circle at 35% 35%,${lighten(planet.color,40)},${planet.color} 60%,${darken(planet.color,40)})`;
      panelStats.innerHTML = planet.stats.map(s =>
        `<div class="stat-item"><span class="stat-val">${s.val}</span><span class="stat-label">${s.label}</span></div>`
      ).join('');
      panel.classList.add('open');
    }

    function closePanel() { selectedPlanet = null; panel.classList.remove('open'); }

    document.getElementById('panel-close').addEventListener('click', closePanel);

    function getEventPos(e) {
      const rect = canvas.getBoundingClientRect();
      if (e.touches) return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
      return { x: e.clientX - rect.left, y: e.clientY - rect.top };
    }

    canvas.addEventListener('mousemove', e => {
      const { x, y } = getEventPos(e);
      const idx = hitTest(x, y);
      hoveredPlanet = (idx >= 0 && idx !== 'sun') ? PLANETS[idx] : null;
      canvas.style.cursor = idx !== -1 ? 'pointer' : 'crosshair';
      if (idx === 'sun') {
        label.textContent = 'The Sun';
        label.style.left  = (cx + 36) + 'px';
        label.style.top   = (cy - 14) + 'px';
        label.classList.add('visible');
      } else if (idx >= 0) {
        const pos = getPlanetPos(idx);
        label.textContent = PLANETS[idx].name;
        label.style.left  = (pos.x + 14) + 'px';
        label.style.top   = (pos.y - 14) + 'px';
        label.classList.add('visible');
      } else {
        label.classList.remove('visible');
      }
    });

    canvas.addEventListener('mouseleave', () => {
      hoveredPlanet = null;
      label.classList.remove('visible');
    });

    canvas.addEventListener('click', e => {
      const { x, y } = getEventPos(e);
      const idx = hitTest(x, y);
      if (idx === 'sun') openPanel(SUN);
      else if (idx >= 0) openPanel(PLANETS[idx]);
      else closePanel();
    });

    canvas.addEventListener('touchstart', e => {
      const { x, y } = getEventPos(e);
      const idx = hitTest(x, y);
      if (idx === 'sun') { e.preventDefault(); openPanel(SUN); }
      else if (idx >= 0) { e.preventDefault(); openPanel(PLANETS[idx]); }
    }, { passive: false });

    // ─── Speed Control ────────────────────────────────────────────
    const slider   = document.getElementById('speed-slider');
    const speedVal = document.getElementById('speed-val');
    const pauseBtn = document.getElementById('pause-btn');

    slider.addEventListener('input', () => {
      speedMult = parseFloat(slider.value);
      speedVal.textContent = speedMult.toFixed(1) + 'x';
    });

    pauseBtn.addEventListener('click', () => {
      paused = !paused;
      pauseBtn.textContent = paused ? 'RESUME' : 'PAUSE';
    });
  </script>
</body>
</html>
